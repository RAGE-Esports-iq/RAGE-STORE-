<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAGE STORE | المتجر الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body id="shop-body">

    <div class="bg-animate"></div>

    <nav class="shop-nav">
        <div class="container">
            <div class="logo">
                <img src="logo.png" alt="RAGE">
                <span>RAGE <b style="color:red">STORE</b></span>
            </div>
            <div class="nav-actions">
                <button class="lang-toggle" onclick="logic.toggleLang()" id="langBtn">English</button>
            </div>
        </div>
    </nav>

    <header class="shop-hero">
        <h1 data-key="hero-title">تجهيزات الأبطال</h1>
        <p data-key="hero-sub">احصل على أفضل المنتجات الحصرية من ريج إسبورتس</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <h2 data-key="products-title">المنتجات المتاحة</h2>
        </div>
        <div class="products-grid" id="store-container">
            </div>
    </main>

    <footer class="shop-footer">
        <div class="social-links">
            <a href="https://www.instagram.com/ragestoreiq" target="_blank" class="ig-btn">
                <i class="fab fa-instagram"></i> <span data-key="ig-text">انستقرام المتجر</span>
            </a>
        </div>
        <p>© 2026 RAGE STORE. Crafted for Winners.</p>
    </footer>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h3 data-key="order-confirm">تأكيد طلب المنتج</h3>
            <div id="selected-item-info"></div>
            <form id="checkoutForm">
                <input type="hidden" name="p_name" id="p_name">
                <input type="hidden" name="p_price" id="p_price">
                <input type="text" name="u_name" id="input-name" placeholder="اسمك الكامل" required>
                <input type="tel" name="u_phone" id="input-phone" placeholder="رقم الهاتف" required>
                <input type="text" name="u_address" id="input-addr" placeholder="العنوان (المحافظة / المنطقة)" required>
                <div class="modal-btns">
                    <button type="submit" class="confirm-btn" data-key="btn-order">إتمام الطلب</button>
                    <button type="button" onclick="ui.closeModal()" class="cancel-btn" data-key="btn-cancel">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
